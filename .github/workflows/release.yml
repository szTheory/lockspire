name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      recovery_reason:
        description: "Recovery-only note for rerunning the trusted release lane"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Confirm manual dispatch is recovery-only
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          test -n "${{ inputs.recovery_reason }}"
          echo "workflow_dispatch is recovery-only. Normal publish intent starts from a merged Release Please PR and the protected hex-publish environment."

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          release-type: elixir
          package-name: lockspire

  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    environment: hex-publish
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@8d44588995e53ce789721e96227122a67826542d # v1.24.0
        with:
          elixir-version: "1.19.5"
          otp-version: "28"

      - name: Restore Mix cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-release-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-release-

      - name: Install dependencies
        run: mix deps.get

      - name: Run trusted release preflight inside protected environment
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix release.preflight

      - name: Publish package from the trusted lane
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
