name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      recovery_reason:
        description: "Recovery-only note for rerunning the trusted release lane"
        required: true
        type: string
      recovery_ref:
        description: "Commit SHA or tag for the exact revision being recovered"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Confirm manual dispatch is recovery-only
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          test -n "${{ inputs.recovery_reason }}"
          test -n "${{ inputs.recovery_ref }}"
          echo "workflow_dispatch is recovery-only. Recovery publishes the exact ref in recovery_ref, and normal publish intent starts from a merged Release Please PR and the protected hex-publish environment."

      - name: Record review-only Release Please PR posture
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          echo "Release Please generated PRs are review-only. Trusted proof starts only after merge in the protected hex-publish environment."

      - name: Run Release Please
        id: release
        uses: ./.github/actions/release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true' }}
    environment: hex-publish
    permissions:
      contents: read
    steps:
      - name: Check out repository for the merged release commit
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check out repository for the recovery ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.recovery_ref }}

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.19.5"
          otp-version: "28"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Restore Mix cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-release-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-release-

      - name: Install dependencies
        run: mix deps.get

      - name: Run trusted release preflight inside protected environment
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix release.preflight

      - name: Publish package from the trusted lane
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
