name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28"

jobs:
  release-hygiene:
    name: Release Hygiene Drift
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify repo-owned release hygiene contract
        run: bash ./scripts/maintainer/repo_hygiene_check.sh --ci

  fast:
    name: Fast Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lockspire_test
          POSTGRES_USER: lockspire
          POSTGRES_PASSWORD: lockspire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lockspire -d lockspire_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCKSPIRE_TEST_DB_HOST: 127.0.0.1
      LOCKSPIRE_TEST_DB_PORT: "5432"
      LOCKSPIRE_TEST_DB_USER: lockspire
      LOCKSPIRE_TEST_DB_PASSWORD: lockspire
      LOCKSPIRE_TEST_DB_NAME: lockspire_test

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore Mix cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-fast-v2-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-fast-v2-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-
            ${{ runner.os }}-mix-fast-v2-

      - name: Install dependencies
        run: mix deps.get

      - name: Wait for PostgreSQL
        run: |
          for _attempt in $(seq 1 30); do
            pg_isready -h "$LOCKSPIRE_TEST_DB_HOST" -p "$LOCKSPIRE_TEST_DB_PORT" -U "$LOCKSPIRE_TEST_DB_USER" -d "$LOCKSPIRE_TEST_DB_NAME" && exit 0
            sleep 1
          done
          echo "PostgreSQL did not become ready in time" >&2
          exit 1

      - name: Run qa gate
        run: mix qa

      - name: Run static application security testing
        run: mix sobelow --config

      - name: Build docs
        run: mix docs.verify

      - name: Audit dependencies (retired + CVEs)
        run: mix deps.audit

      - name: Verify Hex package
        run: mix package.build

      - name: Run fast tests
        run: mix test.fast

      - name: Verify migration reversibility
        run: |
          env MIX_ENV=test mix ecto.rollback --all
          env MIX_ENV=test mix ecto.migrate

  integration:
    name: Integration Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lockspire_test
          POSTGRES_USER: lockspire
          POSTGRES_PASSWORD: lockspire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lockspire -d lockspire_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      LOCKSPIRE_TEST_DB_HOST: 127.0.0.1
      LOCKSPIRE_TEST_DB_PORT: "5432"
      LOCKSPIRE_TEST_DB_USER: lockspire
      LOCKSPIRE_TEST_DB_PASSWORD: lockspire
      LOCKSPIRE_TEST_DB_NAME: lockspire_test

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore Mix cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-integration-v2-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-integration-v2-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-
            ${{ runner.os }}-mix-integration-v2-

      - name: Install dependencies
        run: mix deps.get

      - name: Wait for PostgreSQL
        run: |
          for _attempt in $(seq 1 30); do
            pg_isready -h "$LOCKSPIRE_TEST_DB_HOST" -p "$LOCKSPIRE_TEST_DB_PORT" -U "$LOCKSPIRE_TEST_DB_USER" -d "$LOCKSPIRE_TEST_DB_NAME" && exit 0
            sleep 1
          done
          echo "PostgreSQL did not become ready in time" >&2
          exit 1

      - name: Run integration suite including onboarding and OIDC E2E proof
        run: mix test.integration

      - name: Run Phase 3 protocol gate
        run: mix test.phase3

  adoption-demo:
    name: Adoption Demo Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lockspire_adoption_demo
          POSTGRES_USER: lockspire
          POSTGRES_PASSWORD: lockspire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lockspire -d lockspire_adoption_demo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: dev
      LOCKSPIRE_DEMO_DB_HOST: 127.0.0.1
      LOCKSPIRE_DEMO_DB_PORT: "5432"
      LOCKSPIRE_DEMO_DB_USER: lockspire
      LOCKSPIRE_DEMO_DB_PASSWORD: lockspire
      LOCKSPIRE_DEMO_DB_NAME: lockspire_adoption_demo
      LOCKSPIRE_DEMO_BASE_URL: http://127.0.0.1:4100

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore adoption demo Mix cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            examples/adoption_demo/deps
            examples/adoption_demo/_build
          key: ${{ runner.os }}-mix-adoption-demo-v1-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('examples/adoption_demo/mix.lock', 'mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-adoption-demo-v1-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-
            ${{ runner.os }}-mix-adoption-demo-v1-

      - name: Install adoption demo dependencies
        working-directory: examples/adoption_demo
        run: mix deps.get

      - name: Wait for PostgreSQL
        run: |
          for _attempt in $(seq 1 30); do
            pg_isready -h "$LOCKSPIRE_DEMO_DB_HOST" -p "$LOCKSPIRE_DEMO_DB_PORT" -U "$LOCKSPIRE_DEMO_DB_USER" -d "$LOCKSPIRE_DEMO_DB_NAME" && exit 0
            sleep 1
          done
          echo "PostgreSQL did not become ready in time" >&2
          exit 1

      - name: Compile adoption demo
        working-directory: examples/adoption_demo
        run: mix compile --warnings-as-errors

      - name: Prepare adoption demo database
        working-directory: examples/adoption_demo
        run: mix ecto.setup

      - name: Run adoption demo black-box smoke
        run: |
          mkdir -p tmp
          cd examples/adoption_demo
          mix phx.server > ../../tmp/adoption_demo.log 2>&1 &
          server_pid=$!
          cd ../..

          set +e
          python3 scripts/demo/adoption_smoke.py
          smoke_status=$?
          kill "$server_pid" 2>/dev/null || true

          if [ "$smoke_status" -ne 0 ]; then
            cat tmp/adoption_demo.log
            exit "$smoke_status"
          fi
